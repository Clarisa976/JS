<html>

<head>
    <title>Sumatorio de un array</title>
</head>

<body>
    <h1>Encuentra cuantas veces aparece un número en un array multidimensional</h1>
    <script>
        let numeros = [1, [2, 3, 4], [8, 15, [5, 1]], 27];
        function suma() {
            
            if (numeros.length ==0) {
                return 0;
            }else{
                return numeros[numeros.length-1]+suma();
            }
        }
        console.log(suma());

    </script>
</body>

</html>
