<html>

<head>
    <title>Contador de números de un array</title>
</head>

<body>
    <h1>Encuentra cuantas veces aparece un número en un array multidimensional</h1>
    <script>
        let numeros = [1, [2, 3, 4], [8, 15, [5, 1]], 27];
        const CONTADOR = (arr, num) => {
            let contadorVeces = 0; // contador
            for (let i = 0; i < arr.length; i++) {
                //si es un array se hace una llamada recusrisiva
                //sino compruebo
                if (Array.isArray(arr[i])) {
                  
                    contadorVeces+=CONTADOR(arr[i],num);

                }else{
                    if(arr[i]===num){
                        contadorVeces++;
                        
                    }

                }

            }
            return contadorVeces;
        }




      
       console.log(CONTADOR(numeros,1));


    </script>
</body>

</html>
